services:
  kasm-openclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        KASM_TAG: ${KASM_TAG:-1.17.0}
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    image: clawder/kasm-openclaw:latest
    container_name: clawder-kasm-openclaw
    ports:
      - "6901:6901"     # Kasm desktop, HTTPS (self-signed) — login: kasm_user
      - "18789:18789"   # OpenClaw gateway UI
    environment:
      # Kasm desktop password (user is always `kasm_user`).
      VNC_PW: ${VNC_PW:-password}
      # The container is the sandbox; run OpenClaw unsandboxed inside it.
      OPENCLAW_SANDBOX: "none"
      # Password to log into the OpenClaw gateway UI (required: the gateway refuses
      # to bind the published port 18789 without auth).
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD:-clawder}
      # LLM provider credentials — set whichever you use in .env (see .env.example).
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # Instagram credentials for Rook data collection
      IG_USERNAME: ${IG_USERNAME:-}
      IG_PASSWORD: ${IG_PASSWORD:-}
      IG_USERNAME_2: ${IG_USERNAME_2:-}
      IG_PASSWORD_2: ${IG_PASSWORD_2:-}
    volumes:
      # Persist OpenClaw config, workspace, and auth secrets across rebuilds.
      - ./data/openclaw:/home/kasm-user/.openclaw
      - ./data/config:/home/kasm-user/.config/openclaw
      # Mount agent config/workspace templates so the startup script can deploy them.
      - ./config:/opt/clawder/config:ro
    shm_size: "1gb"     # Chromium inside the desktop needs shared memory
    extra_hosts:
      # Reach a local Ollama / LM Studio running on the host.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
